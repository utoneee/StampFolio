<svg viewBox="0 0 220 140" xmlns="http://www.w3.org/2000/svg">
  <!-- 正常戳 v1：圓形日戳 + 波紋消印，赭紅棕墨。id 為引擎掛動態日期的掛鉤。 -->
  <defs>
    <filter id="inkn" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.2"/>
    </filter>
  </defs>
  <g filter="url(#inkn)" stroke="#96604A" fill="none" opacity="0.88">
    <!-- 圓日戳 -->
    <circle cx="70" cy="70" r="52" stroke-width="3"/>
    <circle cx="70" cy="70" r="37" stroke-width="1.4"/>
    <!-- 波紋消印線 -->
    <g stroke-width="2.6" stroke-linecap="round">
      <path d="M 118 46 Q 138 38 158 46 T 198 46"/>
      <path d="M 120 62 Q 140 54 160 62 T 200 62"/>
      <path d="M 120 78 Q 140 70 160 78 T 200 78"/>
      <path d="M 118 94 Q 138 86 158 94 T 198 94"/>
    </g>
  </g>
  <g font-family="Georgia, serif" fill="#96604A" text-anchor="middle" opacity="0.88" filter="url(#inkn)">
    <text x="70" y="56" font-size="10" letter-spacing="2">COLLECTED</text>
    <text id="pm-normal-date" x="70" y="76" font-size="14" letter-spacing="1">07.05</text>
    <text id="pm-normal-year" x="70" y="93" font-size="9" letter-spacing="3">2026</text>
  </g>
</svg>
